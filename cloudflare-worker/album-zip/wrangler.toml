name = "album-zip-worker"
main = "src/index.ts"
compatibility_date = "2026-03-01"
# Browser-callable signed download endpoint. Lives on a custom domain
# (zip.ninochavez.co) per the worker-domain convention — same root as the
# consuming app instead of a workers.dev URL. CORS locked to ALLOWED_ORIGIN.
workers_dev = false

[[routes]]
pattern = "zip.ninochavez.co"
custom_domain = true

[[r2_buckets]]
binding = "ZIP_CACHE"
bucket_name = "photo-gallery-zips"

# Per-IP rate limit on the zip endpoint (PERF-2). /api/zip-url is public+unauth and mints valid
# signatures freely, so cap request rate here to bound bandwidth / R2-egress abuse. period: 10 or 60.
[[ratelimits]]
name = "ZIP_RATE_LIMITER"
namespace_id = "2001"
simple = { limit = 20, period = 60 }

[vars]
CF_ACCOUNT_HASH = "wg34HB28-JkySWVm5fW4kA"
ALLOWED_ORIGIN = "https://ninochavez.co"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# (SUPABASE_SERVICE_ROLE_KEY doubles as HMAC signing secret)
