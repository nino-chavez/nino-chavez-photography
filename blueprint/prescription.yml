    evidence: "NORTH-STAR §0 (cf_image_id); INGEST-REBUILD-10 §Target step 2; memory [[project_album_pipeline]]."
  - id: P2
    pattern: "Album-authoritative sport: albums.sport + enforce_album_sport trigger; the prompt never guesses sport."
    where: "albums.sport + trigger; database/seed/album-sports.json."
    evidence: "NORTH-STAR §0/§2.2/§9; convergence-ledger.md #1/#2 (HIGH regression risk)."
  - id: P3
    pattern: "One embedText() seam (OpenRouter text-embedding-3-large@768) for write AND query."
    where: "embeddings.ts."
    evidence: "NORTH-STAR §0 (text embedding)/§9; memory [[photography-live-credentials]]."
  - id: P4
    pattern: "Worker-pool ingest engine: bounded concurrency, 429 backoff, resumable checkpoint, lenient-caption parse."
    where: "backfill-vnext.ts."
    evidence: "INGEST-REBUILD-10 §Reference; NORTH-STAR §2.8."
  - id: P5
    pattern: "Shred players[] → photo_jersey_sightings with dedup_key."
    where: "backfill-jersey-sightings.ts."
    evidence: "INGEST-REBUILD-10 §Target step 2; convergence-ledger.md #5 (2,272 sightings backfilled)."
  - id: P6
    pattern: "Taxonomy single-source PLAY_TYPES_BY_SPORT; sport-aware prompt constrains play_type to the album's sport."
    where: "src/lib/ai/taxonomy.ts."
    evidence: "NORTH-STAR §0 (taxonomy rule)/§9; INGEST-REBUILD-10 §Reference."
  - id: P7
    pattern: "extraction_version provenance ('<version>:<model>') — stamp every row; re-process only stale rows."
    where: "photo_metadata.extraction_version (additive — DONE, slice 1)."
    evidence: "NORTH-STAR §0/§2.4; INGEST-REBUILD-10 §Adds/§Slices.1."

