# prescription.yml — Blueprint MIDSTREAM Stage 2 (Prescription)
#
# Cycle 1: the #10 ingest rebuild. A midstream prescription names which existing
# patterns to PRESERVE and which to REVISE, with an evidence cite per item
# (docs/variant-selection.md §"Stage shapes per variant").
#
# The `items:` block below is the prescription-evidence-reviewer's gate surface
# (each change carries what/why/impact/evidence/monetization_side, ordered by
# impact descending). The preserved_patterns / revised_patterns blocks beneath it
# carry the full engineering context. Ported from:
#   .agent-os/specs/vision-extraction-identity-vnext/INGEST-REBUILD-10.md

meta:
  cycle: 1
  name: "Ingest rebuild (#10) — unified structured ingest, direct-to-DB, no EXIF round-trip"
  blast_radius: "New-album processing ONLY — the last system path still on the pre-rebuild pattern."
  status: "Verified against main 2026-06-11 (NOT the stale 2026-06-08 HANDOFF): slice 1 DONE; slices 2-3 BUILT (scripts/ingest-album.ts exists, 2026-06-09); slice 4 (CUTOVER) is the real remaining work — the legacy enrich/sync/run-pipeline scripts + the players[] write + the EXIF round-trip are STILL LIVE, coexisting with the new runner (a no-bridge-rule violation, decisions/0004). Slice 5 (verify) GATED on a real local test album."
  prototype_as_patch: "Building scripts/ingest-album.ts IS the Stage-4 prototype-as-patch — it shows the revision, not a new product."
  source_spec: ".agent-os/specs/vision-extraction-identity-vnext/INGEST-REBUILD-10.md"

# ── Actionable changes (impact-ordered, descending) ──────────────────────────
items:
  - what: "Kill the lossy EXIF round-trip; write typed columns directly to the DB in one pass."
    why: "enrich writes AI metadata into each file's EXIF, then sync shells out to exiftool to read it back and INSERT — wasteful and lossy. The regex keyword parser is deleted."
    impact: high
    evidence: "INGEST-REBUILD-10.md §Why/§Kills; research/current-state/convergence-ledger.md #10; NORTH-STAR §9 (EXIF-keyword round-trip)."
    monetization_side: operator
  - what: "Write photo_jersey_sightings (relational, multi-player) instead of the dead players[] JSONB."
    why: "The players[] write is the last legacy tendril that blocks the players-column drop, and sightings is the surface the find-my-photos pilot queries (find_photos_by_jersey)."
    impact: high
    evidence: "INGEST-REBUILD-10.md §Target/§Kills; convergence-ledger.md #5; research/observations/find-my-photos-demand.md."
    monetization_side: operator
  - what: "Make sport album-authoritative in the ingest: never emit/parse sport per-photo; the enforce_album_sport trigger sets it from albums.sport."
    why: "A per-photo volleyball-biased prompt caused the measured 18-album sport mislabel corruption. The writer must not send sport_type."
    impact: high
    evidence: "INGEST-REBUILD-10.md §Why(b)/§Kills; convergence-ledger.md #1/#2; decisions/0002-know-vs-infer-domain-model.md."
    monetization_side: operator
  - what: "Replace the 3-script execSync orchestration with one resumable module (scripts/ingest-album.ts): upload + extract + embed + DB write + sightings, bounded concurrency, --dry-run, 429 backoff."
    why: "The run-pipeline → enrich → sync → upload chain is brittle; reuse the proven backfill-vnext worker-pool engine in a single module."
    impact: medium
    evidence: "INGEST-REBUILD-10.md §Target/§Kills/§Slices.3; prescription preserved_patterns P4."
    monetization_side: operator
  - what: "Finalize ONE structured, taxonomy-driven, sport-aware extraction prompt; retire the two-bucket variants (BUCKET1_PROMPT / ENHANCED_AGENTIC)."
    why: "The two-bucket prompt zoo drifts; one prompt + one taxonomy.ts prevents the enum-drift class of bug."
    impact: medium
    evidence: "INGEST-REBUILD-10.md §Kills; convergence-ledger.md #2/#10; NORTH-STAR §9 (5-prompt-zoo)."
    monetization_side: operator
  - what: "Reconcile the ingest entry point: ship scripts/ingest-album.ts ONLY if slice 4 deletes the path it replaces in the same slice (net entry-point count must not grow)."
    why: "INGEST-REBUILD-10 proposes a new runner, but NORTH-STAR §0 LOCKED CONTRACTS forbids a third entry point. A replace-in-place honors both; a net-new one does not."
    impact: medium
    evidence: "INGEST-REBUILD-10.md §Slices.3 vs NORTH-STAR §0 (pipeline entry points); decisions/0004 (no-bridge convergence)."
    monetization_side: operator
  - what: "Per-field extraction confidence for a future review queue."
    deferred: "Defer unless a review queue is actually built (INGEST-REBUILD-10 §Adds). Stamped extraction_version already enables surgical re-runs."
    monetization_side: operator

