<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Nino Chavez Photography">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#0a0a0f"/>
  <!-- Camera body -->
  <rect x="28" y="48" width="72" height="48" rx="8" fill="url(#g)"/>
  <!-- Lens -->
  <circle cx="64" cy="72" r="18" fill="#0a0a0f"/>
  <circle cx="64" cy="72" r="14" fill="#1a1a2f" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="64" cy="72" r="6" fill="#8b5cf6" opacity="0.6"/>
  <!-- Viewfinder -->
  <rect x="48" y="38" width="20" height="12" rx="2" fill="url(#g)"/>
  <!-- Flash hotshoe -->
  <rect x="76" y="42" width="12" height="6" rx="1" fill="#22d3ee"/>
  <!-- Shutter button -->
  <circle cx="88" cy="52" r="4" fill="#22d3ee"/>
</svg>
